services:
  # Backend Node Service
  - type: web
    name: novavest-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set in Render Dashboard → Environment
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET_KEY
        generateValue: true  # Render will auto-generate this, or you can set it manually
      # ── Payment / Wallet Settings ───────────────────────────────────────────
      # Admin can also update these live from the Admin Panel → ⚙️ Settings tab
      # without restarting the server. Set them here for persistence on redeploy.
      - key: BTC_WALLET
        sync: false   # Your Bitcoin deposit address
      - key: ETH_WALLET
        sync: false   # Your Ethereum deposit address
      - key: USDT_WALLET
        sync: false   # Your USDT (TRC20) deposit address
      - key: BANK_DETAILS
        sync: false   # Bank transfer instructions (optional)
      # ── Platform Config ─────────────────────────────────────────────────────
      - key: SITE_NAME
        value: Cashflowvest
      - key: SUPPORT_EMAIL
        sync: false   # Admin/support email shown to users
      - key: MIN_DEPOSIT
        value: "200"  # Minimum deposit in USD
      - key: MIN_WITHDRAW
        value: "50"   # Minimum withdrawal in USD
      # ── Email ───────────────────────────────────────────────────────────────
      - key: EMAIL_USER
        sync: false   # Gmail address used to send emails
      - key: EMAIL_PASS
        sync: false   # Gmail App Password
      - key: FRONTEND_URL
        sync: false   # e.g. https://cashflowvest.onrender.com

  # Frontend Static Site
  - type: web
    name: novavest-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: novavest-backend
          envVarKey: RENDER_EXTERNAL_URL
